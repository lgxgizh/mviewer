name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.11.0)'
        required: true
        default: '0.11.0'

# Build a Release binary, package the portable zip + NSIS installer, and attach
# them to the GitHub Release. This is the M11.3 "Release Engineering" automation.
# It never blocks PRs (tag/dispatch only).

permissions:
  contents: write

jobs:
  package:
    name: Build + package (portable zip + installer)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.0
          arch: win64_msvc2022_64
          modules: qtimageformats
          cache: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (Release)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build.ps1 Release

      - name: Package portable zip + installer
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package_release.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MViewer-${{ steps.ver.outputs.version }}-portable.zip
            dist/MViewer-${{ steps.ver.outputs.version }}-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
