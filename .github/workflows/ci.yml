# =============================================================================
# MViewer CI — Phase 1
# -----------------------------------------------------------------------------
# Jobs: format | build | test | package | ci-gate
#
# This is Phase-1 CI for the MViewer Qt6/MSVC C++20 image viewer.
#
# Phase roadmap:
#   - Phase-1 (this file): format, build, test, package, status gate.
#   - Phase-2 (ACTIVE): clang-tidy (gating, bug-finding checks) + clazy (advisory)
#     static analysis, ASan (MSVC /fsanitize=address, gating).
#   - Phase-3: benchmark harness, headless (offscreen) run, screenshot diff.
#   - Phase-4: release automation (tagging, signed installers, changelog).
#
# PR gate expectations (all must pass for a mergeable PR):
#   * clang-format --dry-run passes (no formatting diffs)
#   * markdownlint passes on all .md docs
#   * build succeeds on windows-2022 (MSVC + Qt 6.8.0)
#   * unit tests (ctest) pass
#   * zero compiler warnings in the build log
#   * portable zip artifact is produced
#
# The `ci-gate` job aggregates all required statuses so branch protection can
# depend on a single check.
# =============================================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # format — clang-format + markdownlint (ubuntu, fast)
  # ---------------------------------------------------------------------------
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format

      - name: clang-format (C++20 / Qt6)
        run: |
          find . \( -name '*.cpp' -o -name '*.h' \) \
            -not -path './build_msvc/*' \
            -not -path './build/*' \
            -not -path './.git/*' \
            -not -path '*/Qt/*' \
            -not -path '*/Qt6/*' \
            -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: markdownlint
        run: markdownlint '**/*.md' --ignore node_modules

  # ---------------------------------------------------------------------------
  # build — MSVC + Qt 6.8.0, enforce zero warnings from build log
  # ---------------------------------------------------------------------------
  build:
    name: Build (MSVC + Qt 6.8.0)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.0
          arch: win64_msvc2022_64
          modules: qtimageformats   # provides the TIFF plugin (qtiff.dll) required by M3/M5 golden tests
          cache: true

      - name: Build
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build.ps1 Test 2>&1 | Tee-Object -FilePath build.log

      - name: Enforce zero warnings
        run: |
          if (Select-String -Path build.log -Pattern 'warning:') { exit 1 }

  # ---------------------------------------------------------------------------
  # test — explicit ctest job (re-runs build+test; artifacts not shared in Phase-1)
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests (ctest)
    runs-on: windows-2022
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.0
          arch: win64_msvc2022_64
          modules: qtimageformats   # provides the TIFF plugin (qtiff.dll) required by M3/M5 golden tests
          cache: true

      - name: Test
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build.ps1 Test

  # ---------------------------------------------------------------------------
  # package — zip portable app, upload artifact (optional gate)
  # ---------------------------------------------------------------------------
  package:
    name: Package portable zip
    runs-on: windows-2022
    needs: [build, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.0
          arch: win64_msvc2022_64
          modules: qtimageformats   # provides the TIFF plugin (qtiff.dll) required by M3/M5 golden tests
          cache: true

      - name: Build
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build.ps1 Test

      - name: Package zip
        run: |
          try {
            Compress-Archive -Path build_msvc/bin/*, README.md, LICENSE* -DestinationPath mviewer-win-x64.zip
          } catch {
            Write-Host "LICENSE not found, packaging bin + README only"
            Compress-Archive -Path build_msvc/bin/*, README.md -DestinationPath mviewer-win-x64.zip
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mviewer-win-x64
          path: mviewer-win-x64.zip

  # ---------------------------------------------------------------------------
  # static-analysis — clang-tidy (ubuntu, GATING Phase-2)
  # Generates its own compile_commands.json via a clang configure so it can
  # resolve Qt6 includes. Scoped to high-signal bug-finding checks (not style
  # nits) so the gate catches real defects. Findings uploaded as an artifact.
  # ---------------------------------------------------------------------------
  static-analysis:
    name: Static analysis (clang-tidy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy clang-tools cmake ninja-build

      - name: Install Qt6
        run: |
          sudo apt-get install -y qt6-base-dev qt6-imageformats-plugin

      - name: Configure (export compile_commands.json)
        run: |
          cmake -S . -B build_sa \
            -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang

      - name: Run clang-tidy (bug-finding checks, fails on findings)
        run: |
          find src \( -name '*.cpp' -o -name '*.h' \) \
            -not -path '*/build*' -print0 \
            | xargs -0 clang-tidy -p build_sa \
                --checks='bugprone-*,performance-*,clang-analyzer-*,cppcoreguidelines-pro-type-*,cppcoreguidelines-special-member-functions' \
            > clang-tidy.txt 2>&1 || true
          if grep -qE 'warning:|error:' clang-tidy.txt; then
            echo "clang-tidy found issues (see artifact)"
            cat clang-tidy.txt
            exit 1
          fi

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-findings
          path: clang-tidy.txt

  # ---------------------------------------------------------------------------
  # clazy — Qt-aware static analysis (ubuntu, advisory / non-gating Phase-2)
  # Reports Qt-specific anti-patterns; findings uploaded, never blocks the gate.
  # ---------------------------------------------------------------------------
  clazy:
    name: Static analysis (clazy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clazy + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clazy clang clang-tools cmake ninja-build
          sudo apt-get install -y qt6-base-dev qt6-imageformats-plugin

      - name: Configure (clazy build)
        run: |
          cmake -S . -B build_clazy \
            -G Ninja \
            -DCMAKE_CXX_COMPILER=clazy \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build with clazy (advisory)
        run: |
          cmake --build build_clazy -j 4 2> clazy.txt || true
          echo "clazy run complete (advisory)"

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clazy-findings
          path: clazy.txt

  # ---------------------------------------------------------------------------
  # asan — AddressSanitizer via MSVC /fsanitize=address (windows-2022, GATING)
  # Catches memory errors (use-after-free, leaks, buffer overflows) on the real
  # MSVC toolchain used for release builds.
  # ---------------------------------------------------------------------------
  asan:
    name: ASan (MSVC /fsanitize=address)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.0
          arch: win64_msvc2022_64
          modules: qtimageformats
          cache: true

      - name: Configure (ASan)
        run: cmake -S . -B build_asan -G Ninja -DCMAKE_CXX_FLAGS="/fsanitize=address /Zi"

      - name: Build (ASan)
        run: cmake --build build_asan -j 4

      - name: Test (ASan)
        run: |
          $env:PATH = "D:\QT\6.11.1\msvc2022_64\bin;$env:PATH"
          $env:QT_QPA_PLATFORM = "offscreen"
          cd build_asan
          ctest --output-on-failure -j4

  # ---------------------------------------------------------------------------
  # ci-gate — aggregate required statuses for branch protection
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [format, build, test, package, static-analysis, asan]
    if: always()
    steps:
      - name: All required jobs passed
        run: echo "format, build, test, package, static-analysis, and asan all succeeded."
