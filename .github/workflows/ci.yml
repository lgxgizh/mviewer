name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ─── Formatting check ──────────────────────────────────────────────────────
  # Advisory: reports issues with clang-format but doesn't block CI.
  format:
    runs-on: windows-2022
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM (clang-format)
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "18.1.8"

    - name: Check formatting
      continue-on-error: true
      shell: pwsh
      run: |
        $env:PATH = "${env:LLVM_INSTALL_DIR}\bin;$env:PATH"
        $fmt = Get-Command clang-format -ErrorAction SilentlyContinue
        if (-not $fmt) {
          Write-Host "clang-format not found, skipping format check."
          exit 0
        }
        $files = Get-ChildItem -Recurse -Path src,tests,benchmarks -Include *.cpp,*.h
        $unformatted = @()
        foreach ($f in $files) {
          $out = clang-format --dry-run --Werror $f.FullName 2>&1
          if ($LASTEXITCODE -ne 0) {
            $unformatted += $f.FullName
          }
        }
        if ($unformatted.Count -gt 0) {
          Write-Host "::notice::clang-format found issues in $($unformatted.Count) file(s):"
          foreach ($f in $unformatted) { Write-Host "::notice::  $f" }
        }
        # Don't fail CI for formatting issues; just report.
        Write-Host "Format check diagnostic complete"

  # ─── Build and test ────────────────────────────────────────────────────────
  build:
    runs-on: windows-2022
    needs: format

    env:
      QT_VERSION: 6.11.1
      QT_DIR: D:\QT

    steps:
    - uses: actions/checkout@v4

    - name: Cache Qt
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: ${{ env.QT_DIR }}
        key: qt-${{ env.QT_VERSION }}-windows

    - name: Install Qt (cache miss)
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 6.11.1 win64_msvc2022_64 --outputdir $env:QT_DIR

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake
      shell: pwsh
      run: |
        $env:PATH = "D:\QT\${{ env.QT_VERSION }}\msvc2022_64\bin;$env:PATH"
        cmake -B build_msvc -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="D:\QT\${{ env.QT_VERSION }}\msvc2022_64"

    - name: Build (Release)
      run: cmake --build build_msvc -j

    - name: Run core_tests
      run: QT_QPA_PLATFORM=offscreen ./build_msvc/bin/core_tests.exe

    - name: Run m3m4m5_tests
      run: QT_QPA_PLATFORM=offscreen ./build_msvc/bin/test_m3m4m5.exe

    - name: Run mviewer_unit_tests
      run: QT_QPA_PLATFORM=offscreen ./build_msvc/bin/mviewer_unit_tests.exe

    - name: Run benchmark_scenario
      run: |
        cd build_msvc
        QT_QPA_PLATFORM=offscreen ./bin/benchmark_scenario.exe

    - name: Run golden regression (compare mode)
      run: |
        cd build_msvc
        QT_QPA_PLATFORM=offscreen ./bin/golden_main.exe --compare

    - name: Run vision regression (compare mode)
      run: |
        cd build_msvc
        QT_QPA_PLATFORM=offscreen ./bin/vision_regression.exe --compare

    - name: Run UI fixture regression (compare mode)
      run: |
        cd build_msvc
        QT_QPA_PLATFORM=offscreen ./bin/ui_fixture.exe --compare

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ github.sha }}
        path: build_msvc/bin/benchmark_results.csv

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_msvc/CMakeFiles/CMakeOutput.log
